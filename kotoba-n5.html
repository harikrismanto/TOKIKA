const DECK_ALL = WORDS.map(w=>({kanji:w[0], kana:w[1], romaji:w[2], mean:w[3], cat:w[4]}));
const CATS = ["Semua", ...Array.from(new Set(DECK_ALL.map(d=>d.cat)))];

let DECK = DECK_ALL.slice();
let activeCat = "Semua";
let order = [];
let pos = 0;
let score = 0, streak = 0, best = 0;
let pageStamps = [];
let session = "arti";
let answered = false;
let current = null;
let correctText = "";

const els = {
  kanjiIndex: document.getElementById("kanjiIndex"),
  catTag: document.getElementById("catTag"),
  promptTag: document.getElementById("promptTag"),
  kanjiChar: document.getElementById("kanjiChar"),
  clue: document.getElementById("clue"),
  readingReveal: document.getElementById("readingReveal"),
  options: document.getElementById("options"),
  nextRow: document.getElementById("nextRow"),
  card: document.getElementById("card"),
  hanko: document.getElementById("hanko"),
  missMark: document.getElementById("missMark"),
  statScore: document.getElementById("statScore"),
  statStreak: document.getElementById("statStreak"),
  statBest: document.getElementById("statBest"),
  stampRow: document.getElementById("stampRow"),
  sessionArti: document.getElementById("sessionArti"),
  sessionKanji: document.getElementById("sessionKanji"),
  catRow: document.getElementById("catRow"),
};

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]] = [a[j],a[i]]; }
  return a;
}

function buildCatChips(){
  els.catRow.innerHTML = "";
  CATS.forEach(c=>{
    const chip = document.createElement("button");
    chip.className = "cat-chip" + (c===activeCat ? " active" : "");
    chip.textContent = c + (c==="Semua" ? ` (${DECK_ALL.length})` : ` (${DECK_ALL.filter(d=>d.cat===c).length})`);
    chip.addEventListener("click", ()=>{
      activeCat = c;
      DECK = c==="Semua" ? DECK_ALL.slice() : DECK_ALL.filter(d=>d.cat===c);
      buildCatChips();
      newOrder();
      pageStamps = [];
      buildQuestion();
    });
    els.catRow.appendChild(chip);
  });
}

function newOrder(){ order = shuffle(DECK.map((_,i)=>i)); pos = 0; }

function renderStamps(){
  els.stampRow.innerHTML = "";
  for(let i=0;i<10;i++){
    const slot = document.createElement("div");
    const v = pageStamps[i];
    slot.className = "stamp-slot" + (v===true ? " filled" : v===false ? " miss" : "");
    els.stampRow.appendChild(slot);
  }
}

function renderStats(){
  els.statScore.textContent = score;
  els.statStreak.textContent = streak;
  els.statBest.textContent = best;
}

function buildQuestion(){
  answered = false;
  els.hanko.classList.remove("show");
  els.missMark.classList.remove("show");
  els.card.classList.remove("shake");
  els.nextRow.innerHTML = "";

  if(order.length === 0){ newOrder(); }
  if(pos >= order.length){ newOrder(); }
  if(pageStamps.length >= 10){ pageStamps = []; }

  current = DECK[order[pos]];
  const globalNum = (pos % DECK.length) + 1;
  els.kanjiIndex.textContent = String(globalNum).padStart(3,"0") + " / " + DECK.length;
  els.catTag.textContent = current.cat;
  els.readingReveal.innerHTML = "";

  if(session === "arti"){
    els.promptTag.textContent = "kanji";
    els.kanjiChar.textContent = current.kanji;
    els.kanjiChar.classList.remove("kana-mode");
    els.clue.textContent = "";
    correctText = current.mean;
  } else {
    els.promptTag.textContent = "bacaan";
    els.kanjiChar.textContent = current.kana;
    els.kanjiChar.classList.add("kana-mode");
    els.clue.textContent = "artinya: " + current.mean;
    correctText = current.kanji;
  }

  const fieldFor = session === "arti" ? (e=>e.mean) : (e=>e.kanji);
  const pool = DECK.filter(d => d.kanji !== current.kanji);
  const distractorEntries = shuffle(pool).slice(0,3);
  let choiceTexts = [correctText, ...distractorEntries.map(fieldFor)];
  choiceTexts = [...new Set(choiceTexts)];
  while(choiceTexts.length < 4 && pool.length){
    const extra = fieldFor(shuffle(pool)[0]);
    if(!choiceTexts.includes(extra)) choiceTexts.push(extra);
  }
  choiceTexts = shuffle(choiceTexts);

  els.options.innerHTML = "";
  choiceTexts.forEach(text=>{
    const btn = document.createElement("button");
    btn.className = "opt" + (session === "kanji" ? " kanji-opt" : "");
    btn.textContent = text;
    btn.addEventListener("click", ()=> handleAnswer(btn, text));
    els.options.appendChild(btn);
  });

  renderStamps();
  renderStats();
}

function handleAnswer(btn, text){
  if(answered) return;
  answered = true;
  const isCorrect = text === correctText;

  [...els.options.children].forEach(b=>{
    b.disabled = true;
    if(b.textContent === correctText) b.classList.add("correct");
    else if(b === btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  els.readingReveal.innerHTML =
    `<div class="r1">${current.kanji}</div>` +
    `<div class="r2">${current.kana} (${current.romaji})</div>` +
    `<div class="r3">${current.mean}</div>`;

  if(isCorrect){
    score++; streak++; if(streak>best) best = streak;
    els.hanko.classList.add("show");
    pageStamps[pageStamps.length] = true;
  } else {
    streak = 0;
    els.missMark.classList.add("show");
    els.card.classList.add("shake");
    pageStamps[pageStamps.length] = false;
  }

  renderStats();
  renderStamps();

  const next = document.createElement("button");
  next.className = "next-btn";
  next.textContent = "Lanjut →";
  next.addEventListener("click", ()=>{ pos++; buildQuestion(); });
  els.nextRow.appendChild(next);
}

els.sessionArti.addEventListener("click", ()=>{
  if(session==="arti") return;
  session = "arti";
  els.sessionArti.classList.add("active");
  els.sessionKanji.classList.remove("active");
  buildQuestion();
});
els.sessionKanji.addEventListener("click", ()=>{
  if(session==="kanji") return;
  session = "kanji";
  els.sessionKanji.classList.add("active");
  els.sessionArti.classList.remove("active");
  buildQuestion();
});

buildCatChips();
newOrder();
buildQuestion();
</script>
